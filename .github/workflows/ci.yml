name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  lint-test-build:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATABASE_URL: postgresql://retailos:password@localhost:5432/retailos
      REDIS_URL: redis://:password@localhost:6379
      JWT_SECRET: ci-only-jwt-secret
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_APP_NAME: RetailOS

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: retailos
          POSTGRES_USER: retailos
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U retailos -d retailos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @retailos/api prisma:generate

      - name: Apply database migrations
        run: pnpm --filter @retailos/api exec -- prisma migrate deploy --schema prisma/schema.prisma

      - name: Verify RLS tenant isolation
        run: pnpm --filter @retailos/api prisma:verify-rls

      - name: Lint, typecheck, and test
        run: pnpm check

      - name: Build workspace
        run: pnpm build

      - name: Validate production compose
        run: docker compose --env-file .env.production.example -f infra/docker-compose.prod.yml config

      - name: Validate testing compose
        run: docker compose --env-file .env.testing.example -f infra/docker-compose.test.yml config
    
      - name: Guard BizBil branding
        run: |
            # Fail if RetailOS appears in any user-facing file
            FOUND=$(grep -rn "RetailOS" \
              apps/web/app \
              apps/web/components \
              apps/web/public/manifest.json \
              --include="*.tsx" \
              --include="*.ts" \
              --include="*.json" \
              --exclude-dir=node_modules \
              --exclude-dir=.next \
              | grep -v "RetailOS Local Agent" \
              | grep -v "RetailOS-Offline" \
              | grep -v "RetailOS Print Agent" \
              | grep -v "local-print-agent.ts" \
              | grep -v "offline-queue.ts" \
              || true)

            if [ -n "$FOUND" ]; then
              echo "❌ RetailOS branding found in user-facing files:"
              echo "$FOUND"
              echo ""
              echo "Replace with BizBil before merging."
              exit 1
            fi

            echo "✅ BizBil branding check passed"

            # Fail if CreditCard icon is used in app-shell
            if grep -n "CreditCard" apps/web/components/shared/app-shell.tsx; then
              echo "❌ CreditCard icon found in app-shell — should use bizbil-mark.png"
              exit 1
            fi

            echo "✅ Logo check passed"
            
      - name: Guard BizBil logo assets exist
        run: |
            FILES=(
              "apps/web/public/bizbil-landing/icons/bizbil-mark.png"
              "apps/web/public/bizbil-landing/icons/bizbil-wordmark.png"
              "apps/web/public/bizbil-landing/icons/bizbil-wordmark-no-logo.png"
            )
            for f in "${FILES[@]}"; do
              if [ ! -f "$f" ]; then
                echo "❌ Missing required logo asset: $f"
                exit 1
              fi
            done
            echo "✅ All logo assets present"