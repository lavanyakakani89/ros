name: Deploy Testing

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: retailos-testing
  cancel-in-progress: true

jobs:
  verify:
    name: Verify build before testing deploy
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      DATABASE_URL: postgresql://retailos:password@localhost:5432/retailos
      REDIS_URL: redis://:password@localhost:6379
      JWT_SECRET: ci-only-jwt-secret
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_APP_NAME: RetailOS Testing
      NEXT_PUBLIC_APP_ENV: testing

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: retailos
          POSTGRES_USER: retailos
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U retailos -d retailos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @retailos/api prisma:generate

      - name: Apply migrations to CI database
        run: pnpm --filter @retailos/api exec -- prisma migrate deploy --schema prisma/schema.prisma

      - name: Verify RLS policies
        run: pnpm --filter @retailos/api prisma:verify-rls

      - name: Lint, typecheck, and test
        run: pnpm check

      - name: Build workspace
        run: pnpm build

      - name: Validate testing compose
        run: docker compose --env-file .env.testing.example -f infra/docker-compose.test.yml config

  deploy:
    name: Deploy to testing VPS stack
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: verify
    environment: testing

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      PROD_DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_TEST_PATH: ${{ secrets.DEPLOY_TEST_PATH }}
      HEALTH_URL: ${{ secrets.DEPLOY_TEST_HEALTH_URL }}

    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -Eeuo pipefail
          if [ -z "${DEPLOY_HOST:-}" ]; then
            echo "::error::DEPLOY_HOST secret is empty. Set it in the testing environment to the test VPS hostname or IP."
            exit 1
          fi
          DEPLOY_USER="${DEPLOY_USER:-root}"
          PROD_DEPLOY_PATH="${PROD_DEPLOY_PATH:-/opt/retailos}"
          DEPLOY_TEST_PATH="${DEPLOY_TEST_PATH:-/opt/retailos-testing}"
          HEALTH_URL="${HEALTH_URL:-https://test-ros.sivsanoils.in/api/health}"

          if [ -z "${DEPLOY_SSH_KEY:-}" ]; then
            echo "::error::DEPLOY_SSH_KEY secret is empty. Add the private key text, including BEGIN/END lines, as a repository secret or testing environment secret named DEPLOY_SSH_KEY."
            exit 1
          fi

          if printf '%s' "$DEPLOY_SSH_KEY" | grep -q '\\n'; then
            DEPLOY_SSH_KEY="$(printf '%b' "$DEPLOY_SSH_KEY")"
          fi

          {
            echo "DEPLOY_HOST=$DEPLOY_HOST"
            echo "DEPLOY_USER=$DEPLOY_USER"
            echo "PROD_DEPLOY_PATH=$PROD_DEPLOY_PATH"
            echo "DEPLOY_TEST_PATH=$DEPLOY_TEST_PATH"
            echo "HEALTH_URL=$HEALTH_URL"
          } >> "$GITHUB_ENV"

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub; then
            echo "::error::DEPLOY_SSH_KEY is present but is not a valid OpenSSH private key."
            exit 1
          fi
          ssh-keygen -lf ~/.ssh/id_ed25519.pub
          chmod 700 ~/.ssh
          : > ~/.ssh/known_hosts

      - name: Deploy latest develop on testing stack
        run: |
          ssh -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" "
            set -Eeuo pipefail
            if [ ! -d '$DEPLOY_TEST_PATH/.git' ]; then
              git clone '$PROD_DEPLOY_PATH' '$DEPLOY_TEST_PATH'
            fi
            cd '$DEPLOY_TEST_PATH'
            DEPLOY_BRANCH='develop' DEPLOY_REF='origin/develop' bash infra/deploy-testing.sh
          "

      - name: Health check
        run: |
          for attempt in {1..30}; do
            if curl -fsS "$HEALTH_URL"; then
              exit 0
            fi
            sleep 5
          done
          echo "Testing health check failed: $HEALTH_URL" >&2
          exit 1
      - name: Verify deployment - route assertions
        run: |
          BASE="${HEALTH_URL%/api/health}"
          FAIL=0

          check_route() {
            local url="$BASE$1"
            local expected="$2"
            local status=$(curl -Ls -o /dev/null -w "%{http_code}" \
              --max-time 15 "$url")
            if [ "$status" = "$expected" ]; then
              echo "✅ $1 -> $status"
            else
              echo "❌ $1 -> $status (expected $expected)"
              FAIL=1
            fi
          }

          echo "Waiting 30s for containers to start..."
          sleep 30

          check_route "/api/health" "200"

          VERSION_RESPONSE=$(curl -Ls "$BASE/api/version")
          DEPLOYED_SHA=$(echo "$VERSION_RESPONSE" | grep -o '"commit":"[^"]*"' | cut -d'"' -f4)
          if [ "$DEPLOYED_SHA" = "$DEPLOY_SHA" ]; then
            echo "✅ /api/version -> correct SHA $DEPLOYED_SHA"
          else
            echo "❌ /api/version -> wrong SHA: $DEPLOYED_SHA (expected $DEPLOY_SHA)"
            FAIL=1
          fi

          check_route "/login" "200"
          check_route "/dashboard" "200"
          check_route "/payroll" "200"
          check_route "/settings/payment-methods" "200"

          TITLE=$(curl -Ls "$BASE" | grep -o '<title>[^<]*</title>' | head -1)
          if echo "$TITLE" | grep -qi "bizbil"; then
            echo "✅ Page title contains BizBil"
          else
            echo "❌ Page title wrong: $TITLE (should contain BizBil)"
            FAIL=1
          fi

          if [ "$FAIL" = "1" ]; then
            echo ""
            echo "❌ DEPLOYMENT VERIFICATION FAILED"
            echo "The test server is not serving the correct code."
            echo "Check the bootstrap and origin configuration."
            exit 1
          else
            echo ""
            echo "✅ ALL CHECKS PASSED - test server is correct"
          fi

      - name: Dump testing stack logs on failure
        if: failure()
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_TEST_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_TEST_USER || secrets.DEPLOY_USER }}
          DEPLOY_TEST_PATH: ${{ secrets.DEPLOY_TEST_PATH }}
        run: |
          set -Eeuo pipefail
          if [ -z "${DEPLOY_HOST:-}" ] || [ -z "${DEPLOY_USER:-}" ] || [ -z "${DEPLOY_TEST_PATH:-}" ]; then
            echo "Skipping log dump because deploy host details are unavailable in this run."
            exit 0
          fi

          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            set +e
            cd '$DEPLOY_TEST_PATH'
            docker compose --env-file .env.testing -f infra/docker-compose.test.yml ps -a
            echo '--- api logs ---'
            docker compose --env-file .env.testing -f infra/docker-compose.test.yml logs --tail=400 api
            echo '--- web logs ---'
            docker compose --env-file .env.testing -f infra/docker-compose.test.yml logs --tail=120 web
            echo '--- caddy logs ---'
            docker compose --env-file .env.testing -f infra/docker-compose.test.yml logs --tail=40 caddy
          "
