name: Deploy Testing

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      reset_database:
        description: "Reset test database (DESTROYS ALL DATA)"
        type: boolean
        default: false
        required: false

permissions:
  contents: read

concurrency:
  group: bizbil-testing
  cancel-in-progress: true

jobs:
  verify:
    name: Verify build before testing deploy
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      DATABASE_URL: postgresql://retailos:password@localhost:5432/retailos
      REDIS_URL: redis://:password@localhost:6379
      JWT_SECRET: ci-only-jwt-secret
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_APP_NAME: BizBil Testing
      NEXT_PUBLIC_APP_ENV: testing

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: retailos
          POSTGRES_USER: retailos
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U retailos -d retailos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @bizbil/api prisma:generate

      - name: Apply migrations to CI database
        run: pnpm --filter @bizbil/api exec -- prisma migrate deploy --schema prisma/schema.prisma

      - name: Verify RLS policies
        run: pnpm --filter @bizbil/api prisma:verify-rls

      - name: Lint, typecheck, and test
        run: pnpm check

      - name: Build workspace
        run: pnpm build

      - name: Validate testing compose
        run: docker compose --env-file .env.testing.example -f infra/docker-compose.test.yml config

  deploy:
    name: Deploy to testing VPS stack
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: verify
    environment: testing

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_TEST_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_TEST_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_TEST_PATH }}
      HEALTH_URL: ${{ secrets.DEPLOY_TEST_HEALTH_URL }}
      GH_PAT: ${{ secrets.GH_PAT }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      DEPLOY_SHA: ${{ github.sha }}
      DEPLOY_BRANCH: ${{ github.ref_name }}
      DEPLOY_TIME: ${{ github.event.head_commit.timestamp }}
      RESET_DATABASE: ${{ inputs.reset_database || false }}

    steps:
      - name: Validate deploy secrets
        run: |
          set -Eeuo pipefail

          require_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error::$name is empty. Set it in the testing environment before deploying."
              exit 1
            fi
          }

          require_secret "DEPLOY_TEST_HOST" "$DEPLOY_HOST"
          require_secret "DEPLOY_TEST_USER" "$DEPLOY_USER"
          require_secret "DEPLOY_TEST_PATH" "$DEPLOY_PATH"
          require_secret "DEPLOY_TEST_HEALTH_URL" "$HEALTH_URL"
          require_secret "DEPLOY_TEST_SSH_KEY" "${{ secrets.DEPLOY_TEST_SSH_KEY }}"
          require_secret "GH_PAT" "$GH_PAT"

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_TEST_SSH_KEY }}
        run: |
          set -Eeuo pipefail

          DEPLOY_HOST="${DEPLOY_HOST:?DEPLOY_TEST_HOST is required in the testing environment.}"
          DEPLOY_USER="${DEPLOY_USER:?DEPLOY_TEST_USER is required in the testing environment.}"
          DEPLOY_PATH="${DEPLOY_PATH:?DEPLOY_TEST_PATH is required in the testing environment.}"
          HEALTH_URL="${HEALTH_URL:?DEPLOY_TEST_HEALTH_URL is required in the testing environment.}"
          GH_PAT="${GH_PAT:?GH_PAT is required as a repository secret.}"
          DEPLOY_SSH_KEY="${DEPLOY_SSH_KEY:?DEPLOY_TEST_SSH_KEY is required in the testing environment.}"

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub; then
            echo "::error::DEPLOY_TEST_SSH_KEY is not a valid OpenSSH private key."
            exit 1
          fi

          ssh-keyscan -T 10 -H "$DEPLOY_HOST" > ~/.ssh/known_hosts
          ssh-keygen -lf ~/.ssh/known_hosts
          ssh -o BatchMode=yes -o ConnectTimeout=15 "$DEPLOY_USER@$DEPLOY_HOST" "echo SSH preflight OK on \$(hostname)"

          {
            echo "DEPLOY_HOST=$DEPLOY_HOST"
            echo "DEPLOY_USER=$DEPLOY_USER"
            echo "DEPLOY_PATH=$DEPLOY_PATH"
            echo "HEALTH_URL=$HEALTH_URL"
            echo "DEPLOY_SHA=$DEPLOY_SHA"
            echo "DEPLOY_BRANCH=$DEPLOY_BRANCH"
            echo "DEPLOY_TIME=$DEPLOY_TIME"
          } >> "$GITHUB_ENV"

      - name: Deploy exact testing commit on server
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "GH_PAT='$GH_PAT' GITHUB_REPOSITORY='$GITHUB_REPOSITORY' DEPLOY_SHA='$DEPLOY_SHA' DEPLOY_BRANCH='$DEPLOY_BRANCH' DEPLOY_TIME='$DEPLOY_TIME' RESET_DATABASE='$RESET_DATABASE' DEPLOY_TEST_PATH='$DEPLOY_PATH' bash -s" <<'EOF'
          set -Eeuo pipefail
          REMOTE_URL="https://x-access-token:$GH_PAT@github.com/$GITHUB_REPOSITORY.git"

          if [ ! -d "$DEPLOY_TEST_PATH/.git" ]; then
            echo "First time setup: cloning from GitHub..."
            git clone \
              --branch develop \
              "$REMOTE_URL" \
              "$DEPLOY_TEST_PATH"
            echo "Clone complete."
          else
            echo "Repo exists: checking origin is GitHub..."
            cd "$DEPLOY_TEST_PATH"
            CURRENT_ORIGIN=$(git remote get-url origin 2>/dev/null || echo "none")
            EXPECTED_ORIGIN="https://github.com/$GITHUB_REPOSITORY.git"
            if [[ "$CURRENT_ORIGIN" != *"github.com"* ]]; then
              echo "WARNING: origin is '$CURRENT_ORIGIN' - not GitHub. Fixing..."
              git remote set-url origin \
                "$REMOTE_URL"
              echo "Origin fixed."
            fi
          fi

          cd "$DEPLOY_TEST_PATH"

          CURRENT_ORIGIN=$(git remote get-url origin 2>/dev/null || echo "none")
          echo "Current origin: $CURRENT_ORIGIN"

          if [[ "$CURRENT_ORIGIN" != *"github.com"* ]]; then
            echo "Fixing origin from '$CURRENT_ORIGIN' to GitHub..."
            git remote set-url origin \
              "$REMOTE_URL"
            echo "Origin is now: $(git remote get-url origin)"
          else
            git remote set-url origin \
              "$REMOTE_URL"
            echo "Origin already points to GitHub. Updated credentials."
          fi

          git fetch origin
          git checkout -B develop "$DEPLOY_SHA"
          git reset --hard "$DEPLOY_SHA"

          export DEPLOY_SHA DEPLOY_BRANCH DEPLOY_TIME RESET_DATABASE GH_PAT GITHUB_REPOSITORY
          bash infra/deploy-testing.sh
          EOF

      - name: Health check
        run: |
          for attempt in {1..5}; do
            status=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 15 "$HEALTH_URL" || true)
            if [ "$status" = "200" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "Testing health check failed: $HEALTH_URL did not return HTTP 200 after 5 attempts." >&2
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_ed25519 ~/.ssh/id_ed25519.pub ~/.ssh/known_hosts
