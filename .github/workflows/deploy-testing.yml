name: Deploy Testing

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      reset_database:
        description: "Reset test database (DESTROYS ALL DATA)"
        type: boolean
        default: false
        required: false

permissions:
  contents: read

concurrency:
  group: bizbil-testing
  cancel-in-progress: true

jobs:
  verify:
    name: Verify build before testing deploy
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      DATABASE_URL: postgresql://bizbil:password@localhost:5432/bizbil
      REDIS_URL: redis://:password@localhost:6379
      JWT_SECRET: ci-only-jwt-secret
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_APP_NAME: BizBil Testing
      NEXT_PUBLIC_APP_ENV: testing

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bizbil
          POSTGRES_USER: bizbil
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bizbil -d bizbil"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @bizbil/api prisma:generate

      - name: Apply migrations to CI database
        run: pnpm --filter @bizbil/api exec -- prisma migrate deploy --schema prisma/schema.prisma

      - name: Verify RLS policies
        run: pnpm --filter @bizbil/api prisma:verify-rls

      - name: Lint, typecheck, and test
        run: pnpm check

      - name: Build workspace
        run: pnpm build

      - name: Validate testing compose
        run: docker compose --env-file .env.testing.example -f infra/docker-compose.test.yml config

  deploy:
    name: Deploy to testing VPS stack
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: verify
    environment: testing

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_TEST_HOST || secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_TEST_USER || secrets.DEPLOY_USER }}
      PROD_DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_TEST_PATH: ${{ secrets.DEPLOY_TEST_PATH }}
      HEALTH_URL: https://test.bizbil.com/api/health
      GH_PAT: ${{ secrets.GH_PAT }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      DEPLOY_SHA: ${{ github.sha }}
      DEPLOY_BRANCH: ${{ github.ref_name }}
      DEPLOY_TIME: ${{ github.event.head_commit.timestamp }}
      RESET_DATABASE: ${{ inputs.reset_database || false }}

    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_TEST_SSH_KEY || secrets.DEPLOY_SSH_KEY }}
        run: |
          set -Eeuo pipefail
          if [ -z "${DEPLOY_HOST:-}" ]; then
            echo "::error::DEPLOY_HOST secret is empty. Set it in the testing environment to the test VPS hostname or IP."
            exit 1
          fi
          DEPLOY_USER="${DEPLOY_USER:-root}"
          PROD_DEPLOY_PATH="${PROD_DEPLOY_PATH:-/opt/bizbil}"
          DEPLOY_TEST_PATH="${DEPLOY_TEST_PATH:-/opt/bizbil-testing}"
          HEALTH_URL="${HEALTH_URL:-https://test.bizbil.com/api/health}"

          if [ -z "${GH_PAT:-}" ]; then
            echo "::error::GH_PAT secret is empty. Add a repository secret or testing environment secret named GH_PAT with GitHub repo read access."
            exit 1
          fi

          if [ -z "${DEPLOY_SSH_KEY:-}" ]; then
            echo "::error::DEPLOY_SSH_KEY secret is empty. Add the private key text, including BEGIN/END lines, as a repository secret or testing environment secret named DEPLOY_SSH_KEY."
            exit 1
          fi

          if printf '%s' "$DEPLOY_SSH_KEY" | grep -q '\\n'; then
            DEPLOY_SSH_KEY="$(printf '%b' "$DEPLOY_SSH_KEY")"
          fi

          {
            echo "DEPLOY_HOST=$DEPLOY_HOST"
            echo "DEPLOY_USER=$DEPLOY_USER"
            echo "PROD_DEPLOY_PATH=$PROD_DEPLOY_PATH"
            echo "DEPLOY_TEST_PATH=$DEPLOY_TEST_PATH"
            echo "HEALTH_URL=$HEALTH_URL"
            echo "DEPLOY_SHA=$DEPLOY_SHA"
            echo "DEPLOY_BRANCH=$DEPLOY_BRANCH"
            echo "DEPLOY_TIME=$DEPLOY_TIME"
          } >> "$GITHUB_ENV"

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub; then
            echo "::error::DEPLOY_SSH_KEY is present but is not a valid OpenSSH private key."
            exit 1
          fi
          ssh-keygen -lf ~/.ssh/id_ed25519.pub
          chmod 700 ~/.ssh
          : > ~/.ssh/known_hosts
          ssh -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" "echo SSH preflight OK on \$(hostname)"

      - name: Deploy exact testing commit on server
        run: |
          ssh -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" "GH_PAT='$GH_PAT' GITHUB_REPOSITORY='$GITHUB_REPOSITORY' DEPLOY_SHA='$DEPLOY_SHA' DEPLOY_BRANCH='$DEPLOY_BRANCH' DEPLOY_TIME='$DEPLOY_TIME' RESET_DATABASE='$RESET_DATABASE' DEPLOY_TEST_PATH='$DEPLOY_TEST_PATH' bash -s" <<'EOF'
          set -Eeuo pipefail
          REMOTE_URL="https://x-access-token:$GH_PAT@github.com/$GITHUB_REPOSITORY.git"

          if [ ! -d "$DEPLOY_TEST_PATH/.git" ]; then
            echo "First time setup: cloning from GitHub..."
            git clone \
              --branch develop \
              "$REMOTE_URL" \
              "$DEPLOY_TEST_PATH"
            echo "Clone complete."
          else
            echo "Repo exists: checking origin is GitHub..."
            cd "$DEPLOY_TEST_PATH"
            CURRENT_ORIGIN=$(git remote get-url origin 2>/dev/null || echo "none")
            EXPECTED_ORIGIN="https://github.com/$GITHUB_REPOSITORY.git"
            if [[ "$CURRENT_ORIGIN" != *"github.com"* ]]; then
              echo "WARNING: origin is '$CURRENT_ORIGIN' - not GitHub. Fixing..."
              git remote set-url origin \
                "$REMOTE_URL"
              echo "Origin fixed."
            fi
          fi

          cd "$DEPLOY_TEST_PATH"

          CURRENT_ORIGIN=$(git remote get-url origin 2>/dev/null || echo "none")
          echo "Current origin: $CURRENT_ORIGIN"

          if [[ "$CURRENT_ORIGIN" != *"github.com"* ]]; then
            echo "Fixing origin from '$CURRENT_ORIGIN' to GitHub..."
            git remote set-url origin \
              "$REMOTE_URL"
            echo "Origin is now: $(git remote get-url origin)"
          else
            git remote set-url origin \
              "$REMOTE_URL"
            echo "Origin already points to GitHub. Updated credentials."
          fi

          git fetch origin
          git checkout -B develop "$DEPLOY_SHA"
          git reset --hard "$DEPLOY_SHA"

          export DEPLOY_SHA DEPLOY_BRANCH DEPLOY_TIME RESET_DATABASE GH_PAT GITHUB_REPOSITORY
          bash infra/deploy-testing.sh
          EOF

      - name: Health check
        run: |
          for attempt in {1..30}; do
            if curl -fsS "$HEALTH_URL"; then
              exit 0
            fi
            sleep 5
          done
          echo "Testing health check failed: $HEALTH_URL" >&2
          exit 1

      - name: Verify deployment - route assertions
        run: |
          BASE="${HEALTH_URL%/api/health}"
          FAIL=0

          check_route() {
            local url="$BASE$1"
            local expected="$2"
            local status=$(curl -Ls -o /dev/null -w "%{http_code}" \
              --max-time 15 "$url")
            if [ "$status" = "$expected" ]; then
              echo "✅ $1 -> $status"
            else
              echo "❌ $1 -> $status (expected $expected)"
              FAIL=1
            fi
          }

          echo "Waiting 30s for containers to start..."
          sleep 30

          check_route "/api/health" "200"

          VERSION_RESPONSE=$(curl -Ls "$BASE/api/version")
          DEPLOYED_SHA=$(echo "$VERSION_RESPONSE" | grep -o '"commit":"[^"]*"' | cut -d'"' -f4)
          if [ "$DEPLOYED_SHA" = "$DEPLOY_SHA" ]; then
            echo "✅ /api/version -> correct SHA $DEPLOYED_SHA"
          else
            echo "❌ /api/version -> wrong SHA: $DEPLOYED_SHA (expected $DEPLOY_SHA)"
            FAIL=1
          fi

          check_route "/login" "200"
          check_route "/dashboard" "200"
          check_route "/payroll" "200"
          check_route "/settings/payment-methods" "200"

          TITLE=$(curl -Ls "$BASE" | grep -o '<title>[^<]*</title>' | head -1)
          if echo "$TITLE" | grep -qi "bizbil"; then
            echo "✅ Page title contains BizBil"
          else
            echo "❌ Page title wrong: $TITLE (should contain BizBil)"
            FAIL=1
          fi

          if [ "$FAIL" = "1" ]; then
            echo ""
            echo "❌ DEPLOYMENT VERIFICATION FAILED"
            echo "The test server is not serving the correct code."
            echo "Check the bootstrap and origin configuration."
            exit 1
          else
            echo ""
            echo "✅ ALL CHECKS PASSED - test server is correct"
          fi

      - name: Dump testing stack logs on failure
        if: failure()
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_TEST_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_TEST_USER || secrets.DEPLOY_USER }}
          DEPLOY_TEST_PATH: ${{ secrets.DEPLOY_TEST_PATH }}
        run: |
          set -Eeuo pipefail
          if [ -z "${DEPLOY_HOST:-}" ] || [ -z "${DEPLOY_USER:-}" ] || [ -z "${DEPLOY_TEST_PATH:-}" ]; then
            echo "Skipping log dump because deploy host details are unavailable in this run."
            exit 0
          fi

          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            set +e
            cd '$DEPLOY_TEST_PATH'
            docker compose --env-file .env.testing -f infra/docker-compose.test.yml ps -a
            echo '--- api logs ---'
            docker compose --env-file .env.testing -f infra/docker-compose.test.yml logs --tail=400 api
            echo '--- web logs ---'
            docker compose --env-file .env.testing -f infra/docker-compose.test.yml logs --tail=120 web
            echo '--- caddy logs ---'
            docker compose --env-file .env.testing -f infra/docker-compose.test.yml logs --tail=40 caddy
          "
