name: Deploy Testing

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      reset_database:
        description: 'Reset test database (DESTROYS ALL DATA)'
        type: boolean
        default: false
        required: false

permissions:
  contents: read

concurrency:
  group: retailos-testing
  cancel-in-progress: true

jobs:
  verify:
    name: Verify build before testing deploy
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      DATABASE_URL: postgresql://retailos:password@localhost:5432/retailos
      REDIS_URL: redis://:password@localhost:6379
      JWT_SECRET: ci-only-jwt-secret
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_APP_NAME: BizBil Testing
      NEXT_PUBLIC_APP_ENV: testing

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: retailos
          POSTGRES_USER: retailos
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U retailos -d retailos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @retailos/api prisma:generate

      - name: Apply migrations to CI database
        run: pnpm --filter @retailos/api exec -- prisma migrate deploy --schema prisma/schema.prisma

      - name: Verify RLS policies
        run: pnpm --filter @retailos/api prisma:verify-rls

      - name: Lint, typecheck, and test
        run: pnpm check

      - name: Build workspace
        run: pnpm build

      - name: Validate testing compose
        run: docker compose --env-file .env.testing.example -f infra/docker-compose.test.yml config

  deploy:
    name: Deploy to testing VPS stack
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: verify
    environment: testing

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      PROD_DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_TEST_PATH: ${{ secrets.DEPLOY_TEST_PATH }}
      HEALTH_URL: ${{ secrets.DEPLOY_TEST_HEALTH_URL }}
      GH_PAT: ${{ secrets.GH_PAT }}
      DEPLOY_BRANCH: ${{ github.ref_name }}
      DEPLOY_SHA: ${{ github.sha }}
      DEPLOY_TIME: ${{ github.event.head_commit.timestamp }}

    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -Eeuo pipefail
          DEPLOY_HOST="${DEPLOY_HOST:-66.42.79.12}"
          DEPLOY_USER="${DEPLOY_USER:-root}"
          PROD_DEPLOY_PATH="${PROD_DEPLOY_PATH:-/opt/retailos}"
          DEPLOY_TEST_PATH="${DEPLOY_TEST_PATH:-/opt/retailos-testing}"
          HEALTH_URL="${HEALTH_URL:-https://test.bizbil.com/api/health}"
          GH_PAT="${GH_PAT:-}"

          if [ -z "${DEPLOY_SSH_KEY:-}" ]; then
            echo "::error::DEPLOY_SSH_KEY secret is empty. Add the private key text, including BEGIN/END lines, as a repository secret or testing environment secret named DEPLOY_SSH_KEY."
            exit 1
          fi

          if [ -z "${GH_PAT:-}" ]; then
            echo "::error::GH_PAT secret is empty. Add a PAT with repo read permissions as GH_PAT in repository secrets."
            exit 1
          fi

          if printf '%s' "$DEPLOY_SSH_KEY" | grep -q '\\n'; then
            DEPLOY_SSH_KEY="$(printf '%b' "$DEPLOY_SSH_KEY")"
          fi

          {
            echo "DEPLOY_HOST=$DEPLOY_HOST"
            echo "DEPLOY_USER=$DEPLOY_USER"
            echo "PROD_DEPLOY_PATH=$PROD_DEPLOY_PATH"
            echo "DEPLOY_TEST_PATH=$DEPLOY_TEST_PATH"
            echo "HEALTH_URL=$HEALTH_URL"
          } >> "$GITHUB_ENV"

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub; then
            echo "::error::DEPLOY_SSH_KEY is present but is not a valid OpenSSH private key."
            exit 1
          fi
          ssh-keygen -lf ~/.ssh/id_ed25519.pub
          ssh-keyscan -T 10 -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy latest develop on testing stack
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            set -Eeuo pipefail
            GH_PAT='${GH_PAT}'
            GITHUB_REPOSITORY='${{ github.repository }}'
            DEPLOY_BRANCH='${{ github.ref_name }}'
            DEPLOY_SHA='${DEPLOY_SHA}'
            DEPLOY_TIME='${DEPLOY_TIME}'
            RESET_DATABASE='${{ github.event.inputs.reset_database }}'
            echo "Deploying commit: $DEPLOY_SHA to branch $DEPLOY_BRANCH"
            if [ ! -d '$DEPLOY_TEST_PATH/.git' ]; then
              echo "First time setup: cloning from GitHub..."
              git clone \
                --branch develop \
                https://\$GH_PAT@github.com/\$GITHUB_REPOSITORY.git \
                $DEPLOY_TEST_PATH
              echo "Clone complete."
            else
              echo "Repo exists: checking origin is GitHub..."
              cd '$DEPLOY_TEST_PATH'
              CURRENT_ORIGIN=$(git remote get-url origin 2>/dev/null || echo "none")
              EXPECTED_ORIGIN="https://github.com/\$GITHUB_REPOSITORY.git"
              if [[ "$CURRENT_ORIGIN" != *"github.com"* ]]; then
                echo "WARNING: origin is '$CURRENT_ORIGIN' — not GitHub. Fixing..."
                git remote set-url origin \
                  https://\$GH_PAT@github.com/\$GITHUB_REPOSITORY.git
                echo "Origin fixed."
              fi
            fi
            cd '$DEPLOY_TEST_PATH'
            DEPLOY_BRANCH="\$DEPLOY_BRANCH" DEPLOY_SHA="\$DEPLOY_SHA" DEPLOY_TIME="\$DEPLOY_TIME" RESET_DATABASE="\$RESET_DATABASE" GITHUB_REPOSITORY="\$GITHUB_REPOSITORY" GH_PAT="\$GH_PAT" bash infra/deploy-testing.sh
          "

      - name: Verify deployment — route assertions
        run: |
          BASE="${HEALTH_URL%/api/health}"
          FAIL=0

          check_route() {
            local url="$BASE$1"
            local expected="$2"
            local status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$url")
            if [ "$status" = "$expected" ]; then
              echo "✅ $1 → $status"
            else
              echo "❌ $1 → $status (expected $expected)"
              FAIL=1
            fi
          }

          echo "Waiting 30s for containers to start..."
          sleep 30

          check_route "/api/health" "200"

          VERSION_RESPONSE=$(curl -s "$BASE/api/version")
          DEPLOYED_SHA=$(echo "$VERSION_RESPONSE" | grep -o '"commit":"[^"]*"' | cut -d'"' -f4)
          if [ "$DEPLOYED_SHA" = "${{ github.sha }}" ]; then
            echo "✅ /api/version → correct SHA $DEPLOYED_SHA"
          else
            echo "❌ /api/version → wrong SHA: $DEPLOYED_SHA (expected ${{ github.sha }})"
            FAIL=1
          fi

          check_route "/login" "200"
          check_route "/dashboard" "200"
          check_route "/payroll" "200"
          check_route "/settings/payment-methods" "200"

          TITLE=$(curl -s "$BASE" | grep -o '<title>[^<]*</title>' | head -1)
          if echo "$TITLE" | grep -qi "bizbil"; then
            echo "✅ Page title contains BizBil"
          else
            echo "❌ Page title wrong: $TITLE (should contain BizBil)"
            FAIL=1
          fi

          if [ "$FAIL" = "1" ]; then
            echo ""
            echo "❌ DEPLOYMENT VERIFICATION FAILED"
            echo "The test server is not serving the correct code."
            echo "Check the bootstrap and origin configuration."
            exit 1
          else
            echo ""
            echo "✅ ALL CHECKS PASSED — test server is correct"
          fi
