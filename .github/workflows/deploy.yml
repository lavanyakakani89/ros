name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: retailos-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/retailos' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          test -n "$HETZNER_HOST"
          test -n "$HETZNER_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$HETZNER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HETZNER_HOST" >> ~/.ssh/known_hosts

      - name: Prepare release directory
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
        run: ssh "$HETZNER_USER@$HETZNER_HOST" "mkdir -p '$DEPLOY_PATH'"

      - name: Upload release
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'node_modules' \
            --exclude '**/node_modules' \
            --exclude '**/.next' \
            --exclude '**/dist' \
            ./ "$HETZNER_USER@$HETZNER_HOST:$DEPLOY_PATH/"

      - name: Build and restart services
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh "$HETZNER_USER@$HETZNER_HOST" "
            set -e
            cd '$DEPLOY_PATH'
            test -f .env.production
            docker compose --env-file .env.production -f infra/docker-compose.prod.yml build
            docker compose --env-file .env.production -f infra/docker-compose.prod.yml up -d postgres redis minio
            docker compose --env-file .env.production -f infra/docker-compose.prod.yml run --rm api pnpm --filter @retailos/api exec -- prisma migrate deploy --schema prisma/schema.prisma
            docker compose --env-file .env.production -f infra/docker-compose.prod.yml up -d
            docker compose --env-file .env.production -f infra/docker-compose.prod.yml ps
          "
