name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: retailos-production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify build before deploy
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      DATABASE_URL: postgresql://retailos:password@localhost:5432/retailos
      REDIS_URL: redis://:password@localhost:6379
      JWT_SECRET: ci-only-jwt-secret
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_APP_NAME: RetailOS

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: retailos
          POSTGRES_USER: retailos
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U retailos -d retailos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @retailos/api prisma:generate

      - name: Apply migrations to CI database
        run: pnpm --filter @retailos/api exec -- prisma migrate deploy --schema prisma/schema.prisma

      - name: Verify RLS policies
        run: pnpm --filter @retailos/api prisma:verify-rls

      - name: Lint, typecheck, and test
        run: pnpm check

      - name: Build workspace
        run: pnpm build

      - name: Validate production compose
        run: docker compose --env-file .env.production.example -f infra/docker-compose.prod.yml config

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: verify

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/retailos' }}
      HEALTH_URL: ${{ secrets.DEPLOY_HEALTH_URL || 'https://ros.sivsanoils.in/api/health' }}

    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          test -n "$DEPLOY_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy latest main on server
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            set -Eeuo pipefail
            cd '$DEPLOY_PATH'
            DEPLOY_REF='origin/main' bash infra/deploy-production.sh
          "

      - name: Health check
        run: |
          for attempt in {1..30}; do
            if curl -fsS "$HEALTH_URL"; then
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed: $HEALTH_URL" >&2
          exit 1
